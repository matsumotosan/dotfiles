env:
  TERM: xterm-256color

shell:
  program: /usr/local/bin/fish

window:
  padding:
   x: 4
   y: 4
  decorations: buttonless
  opacity: 0.95

scrolling:
  history: 10000
  multiplier: 3

font:
  size: 14.0
  normal:
    # family: "MesloLG Nerd Font"
    # family: "JetBrainsMono Nerd Font"
    family: "SFMono Nerd Font"

cursor:
  unfocused_hollow: true
  style:
    shape: Block
    blinking: Never

## COLORSCHEMES
schemes:
  ### Gruvbox dark ###
  gruvbox-dark: &gruvbox-dark
    # Default colors
    primary:
      background: '#1b1b1b'
      foreground: '#ebdbb2'

    # Normal colors
    normal:
      black:   '#282828'
      red:     '#cc241d'
      green:   '#98971a'
      yellow:  '#d79921'
      blue:    '#458588'
      magenta: '#b16286'
      cyan:    '#689d6a'
      white:   '#a89984'

    # Bright colors
    bright:
      black:   '#928374'
      red:     '#fb4934'
      green:   '#b8bb26'
      yellow:  '#fabd2f'
      blue:    '#83a598'
      magenta: '#d3869b'
      cyan:    '#8ec07c'
      white:   '#ebdbb2'

colors: *gruvbox-dark
